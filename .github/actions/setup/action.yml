name: Setup Go Environment
description: Setup Go toolchain

inputs:
  go-version:
    description: Go version to install
    required: false
    default: stable

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: ${{ inputs.go-version }}
        cache: true
