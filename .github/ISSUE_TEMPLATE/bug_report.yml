name: Bug Report
description: Report a bug
labels: ["Type: Bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the issue you encountered.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `warp-wg ...`
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `warp-wg version`
      placeholder: "v0.3.2"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.4 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true
